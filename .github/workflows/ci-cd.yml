name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Step 1-3: Lint, Type Check, Test
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test -- --run

  # Step 4-5: Build and push Docker image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Step 6-8: Deploy to Banner
  deploy:
    name: Deploy to Banner
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.BANNER_SSH_KEY }}
          BANNER_HOST: ${{ secrets.BANNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$BANNER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Banner
        env:
          BANNER_HOST: ${{ secrets.BANNER_HOST }}
          REGISTRY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          ssh -o StrictHostKeyChecking=no deploy@"$BANNER_HOST" << 'ENDSSH'
            cd /opt/stacks/the-keep

            # Pull latest image
            docker compose pull app

            # Run migrations
            docker compose run --rm app npm run db:migrate || true

            # Deploy with zero-downtime
            docker compose up -d app

            # Wait for health check
            sleep 5

            # Verify deployment
            curl -sf http://localhost:5010/api/health || exit 1
          ENDSSH

      - name: Verify deployment externally
        run: |
          sleep 10
          curl -sf https://keep.nextlevelfoundry.com/api/health || exit 1

  # Notifications
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [quality, build, deploy]
    if: always()
    steps:
      - name: Determine status
        id: status
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [[ "$DEPLOY_RESULT" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=Deployed successfully" >> $GITHUB_OUTPUT
          elif [[ "$QUALITY_RESULT" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Quality checks failed" >> $GITHUB_OUTPUT
          elif [[ "$BUILD_RESULT" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Docker build failed" >> $GITHUB_OUTPUT
          elif [[ "$DEPLOY_RESULT" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Deployment failed" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "emoji=⏭️" >> $GITHUB_OUTPUT
            echo "message=Pipeline skipped" >> $GITHUB_OUTPUT
          fi

      - name: Send ntfy notification
        if: steps.status.outputs.status != 'skipped'
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          STATUS_MESSAGE: ${{ steps.status.outputs.message }}
          STATUS_EMOJI: ${{ steps.status.outputs.emoji }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          curl -H "Title: The Keep CI/CD" \
               -H "Tags: $STATUS_EMOJI" \
               -d "$STATUS_MESSAGE - ${COMMIT_SHA:0:7}" \
               "$NTFY_URL/the-keep-ci" || true
