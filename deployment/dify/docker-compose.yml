version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: the-keep-dify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-difypass123}
      POSTGRES_DB: ${POSTGRES_DB:-dify}
    volumes:
      - dify-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dify-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: the-keep-dify-redis
    restart: unless-stopped
    volumes:
      - dify-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dify-net

  # Dify API Backend
  api:
    image: langgenius/dify-api:latest
    container_name: the-keep-dify-api
    restart: unless-stopped
    environment:
      MODE: api
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-the-keep-dify-secret-key-change-me}
      CONSOLE_WEB_URL: http://10.0.0.33:5012
      CONSOLE_API_URL: http://10.0.0.33:5012
      SERVICE_API_URL: http://10.0.0.33:5012
      APP_WEB_URL: http://10.0.0.33:5012

      # Database
      DB_USERNAME: ${POSTGRES_USER:-dify}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-difypass123}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-dify}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      # Storage
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage

      # Vector store (using built-in)
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080

      # Celery
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dify-net

  # Dify Worker (background jobs)
  worker:
    image: langgenius/dify-api:latest
    container_name: the-keep-dify-worker
    restart: unless-stopped
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-the-keep-dify-secret-key-change-me}

      # Database
      DB_USERNAME: ${POSTGRES_USER:-dify}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-difypass123}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-dify}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      # Storage
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage

      # Vector store
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080

      # Celery
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dify-net

  # Weaviate Vector Database
  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: the-keep-dify-weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - dify-weaviate-data:/var/lib/weaviate
    networks:
      - dify-net

  # Dify Web Frontend
  web:
    image: langgenius/dify-web:latest
    container_name: the-keep-dify-web
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: http://10.0.0.33:5012
      APP_API_URL: http://10.0.0.33:5012
    depends_on:
      - api
    networks:
      - dify-net

  # Nginx Proxy
  nginx:
    image: nginx:alpine
    container_name: the-keep-dify-nginx
    restart: unless-stopped
    ports:
      - "5012:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - dify-net

volumes:
  dify-db-data:
  dify-redis-data:
  dify-storage:
  dify-weaviate-data:

networks:
  dify-net:
    driver: bridge
