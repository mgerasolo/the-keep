# The Keep - Docker Compose Stack
# Development services for local testing
# Production deployment: Banner (10.0.0.33), port 5010

services:
  # PostgreSQL with pgvector for embeddings/RAG
  db:
    image: pgvector/pgvector:pg16
    container_name: the-keep-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: thekeep
      POSTGRES_PASSWORD: ${DB_PASSWORD:-thekeep_dev}
      POSTGRES_DB: thekeep
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5017:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thekeep -d thekeep"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: the-keep-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "5018:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: the-keep-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application (for production deployment)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: the-keep-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://thekeep:${DB_PASSWORD:-thekeep_dev}@db:5432/thekeep
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: the-keep
      LITELLM_URL: ${LITELLM_URL:-http://10.0.0.27:2764}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    ports:
      - "5010:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    profiles:
      - production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.the-keep.rule=Host(`keep.nextlevelfoundry.com`)"
      - "traefik.http.routers.the-keep.entrypoints=websecure"
      - "traefik.http.routers.the-keep.tls=true"
      - "traefik.http.routers.the-keep.tls.certresolver=letsencrypt"
      - "traefik.http.services.the-keep.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    networks:
      - default
      - traefik-public

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: the-keep-network
  traefik-public:
    name: traefik-public
    external: false
