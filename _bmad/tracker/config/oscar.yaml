# Oscar Project Configuration - Infrastructure
# Generated: 2026-03-04 via /oscar:config setup wizard

# Tracking System Configuration
tracking:
  type: github
  config:
    repo: "mgerasolo/nlf-infrastructure"
    project_board: "https://github.com/users/mgerasolo/projects/2"

# Phase Configuration
phases:
  # Infrastructure uses flexible mode - Oscar picks per-issue
  mode: flexible

  # Core checkpoints that ALWAYS apply to GitHub Issue work
  core_checkpoints:
    - validate-scope     # Confirm we have the right scope to do the work
    - implement          # Do the work
    - verify             # Run any tests/checks to validate
    - update-docs        # Update DEPLOYMENTS.md, Grist, inventory, etc.
    - done               # Mark complete

  # Oscar assesses issue complexity and applies appropriate depth:
  # Simple (DNS, config change): validate-scope > implement > verify > done
  # Medium (new service deploy): full core checkpoints
  # Complex (architecture, multi-host): adds research/design before implement

# Ad-Hoc Work Mode (no GitHub Issue)
adhoc:
  # Oscar detects request type and routes accordingly
  routing:
    troubleshooting:
      # Just fix it. No issue, no ceremony.
      create_issue: false
      follow_ups: false
      tracking: none

    building_new:
      # New service, stack, tool - create issue, follow process
      create_issue: true
      follow_ups: true
      tracking: full
      auto_updates:
        - deployments_md
        - grist_registry
        - dashboard
        - traefik_dns

    new_protocol:
      # ShepardProtocol or new process - always tracked
      create_issue: true
      follow_ups: true
      tracking: full

    quick_config:
      # DNS record, port change - do it, run follow-ups if needed
      create_issue: false
      follow_ups: auto  # Oscar decides based on what changed
      tracking: light

  # When ambiguous, Oscar asks which mode
  ask_when_ambiguous: true

# Gate Enforcement
gates:
  # Mixed: strict for production, advisory for everything else
  mode: mixed

  strict_targets:
    - hulk        # Production - hard blocks

  advisory_targets:
    - banner      # Dev - warnings only
    - parker      # Experimental - warnings only
    - helicarrier # Infrastructure - warnings only
    - coulson     # Monitoring - warnings only
    - fury        # NAS - warnings only

  # No fixed test command - infrastructure is mostly config/scripts
  # Oscar picks verification method per task type
  test_command: null

# Observer Mode
observer:
  enabled: true
  auto_recovery: true
  drift_detection: true

# Marathon Mode (Autonomous Batch Processing)
marathon:
  enabled: true
  max_attempts_per_issue: 3
  pause_between_issues: 5
  stop_on_failure: false

# Agent Team Assignments (infrastructure-adapted)
team:
  task_routing:
    troubleshooting: [sherlock, dev]
    deployment: [dev]
    dns_routing: [dev]
    monitoring: [dev]
    research: [analyst]
    architecture: [architect]
    audit: [augie]
    documentation: [tech-writer]

# Label Taxonomy (for GitHub Issues)
# NOTE: Labels need auditing - flagged as sidebar work
labels:
  phase:
    prefix: "phase:"
    values:
      - "backlog"
      - "active"
      - "verifying"
      - "documenting"
      - "done"

  next_action:
    prefix: "next:"
    values:
      - "ai-ready"
      - "human-input"
      - "human-verification"
      - "blocked"

  workflow:
    prefix: "workflow:"
    values:
      - "standard"
      - "troubleshooting"
      - "quick"

# Herding Integration
herding:
  enabled: true
  auto_submit_process_issues: true

# Logging
logging:
  enabled: true
  rotation: daily
  retention_days: 30

# Feedback Capture
feedback:
  enabled: true
  triggers:
    - user_override
    - process_skip
    - repeated_question
    - frustration_signal

# =============================================================================
# PROJECT RESOURCES
# =============================================================================

resources:
  deployments_registry: "DEPLOYMENTS.md"
  project_claude_md: "CLAUDE.md"

  n8n:
    url: "https://n8n.ucontrolnetwork.com"
    internal: "http://10.0.0.27:2705"
    note: "Check existing workflows before building new automation"

  maintenance_system:
    type: grist
    status: partially-configured
    notification: slack
    note: "Grist + Slack partially set up. Needs completion."

  tool_inventory:
    config: "_bmad/tracker/config/sherlock-tools.yaml"
    gaps: "_bmad/tracker/config/sherlock-gaps.yaml"

  dashboards:
    - name: "NLF Dashboard"
      url: "https://dashboard.nextlevelfoundry.com"

  portainer:
    helicarrier: "https://portainer.ucontrolnetwork.com"

# =============================================================================
# PROJECT CONTEXT
# =============================================================================

project_context:
  # Infrastructure touches all hosts
  primary_host: null  # No single primary - depends on task

  allowed_hosts:
    - helicarrier
    - coulson
    - banner
    - hulk
    - parker
    - fury

  forbidden_hosts:
    - stark
    - friday
    - captain
    - vision

  deployment_method: portainer

  paths:
    stacks: "/mnt/foundry_infrastructure/apps/"
    ansible: "/mnt/foundry_infrastructure/ansible/"
    standards: "/mnt/foundry_infrastructure/standards-infrastructure/"
    protocols: "/mnt/foundry_resources/protocols/"
    secrets: "/mnt/foundry_devlab/secrets/env/"
    one_offs: "~/Infrastructure/one-offs/active/"
