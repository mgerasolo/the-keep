# Oscar Project Configuration
# Run /oscar:setup to configure these values interactively

tracking:
  type: github  # github | linear | bmad-artifacts
  config:
    repo: "mgerasolo/nlf-infrastructure"
    project_board: "https://github.com/users/mgerasolo/projects/2"

phases:
  mode: full  # full | quick

gates:
  strict: true

observer:
  enabled: true
  auto_recovery: true

marathon:
  enabled: true
  max_attempts_per_issue: 3

# Project Resources - Oscar should be aware of these before suggesting new tools
resources:
  # Core documentation
  deployments_registry: "/home/mgerasolo/Infrastructure/DEPLOYMENTS.md"
  project_claude_md: "/home/mgerasolo/Infrastructure/CLAUDE.md"

  # Automation & Workflows
  n8n:
    url: "https://n8n.nextlevelguild.com"
    internal: "http://10.0.0.27:2750"
    root: "/mnt/foundry_resources/n8n/"
    checklist: "/mnt/foundry_resources/n8n/CHECKLIST-new-workflow.md"
    note: "Per-workflow folders; check existing before building new"

  # Maintenance & Tracking
  grist:
    url: "https://grist.ucontrolnetwork.com"
    doc_id: "uNZG8PhepVScStYXVQKfR3"
    internal: "http://10.0.0.33:3390"
    note: "Central registry for hosts, apps, deployments, n8n workflows"

  maintenance_grist:
    slack_channel: "#maintenance"
    note: "Bi-weekly maintenance notifications configured"

  # Tool Inventory (for Sherlock integration)
  tool_inventory:
    config: "_bmad/tracker/config/sherlock-tools.yaml"
    gaps: "_bmad/tracker/config/sherlock-gaps.yaml"

  # Dashboards
  nlf_dashboard: "https://dashboard.nextlevelfoundry.com"
  grafana: "https://grafana.ucontrolnetwork.com"

  # Container Management
  portainer: "https://portainer-helicarrier.ucontrolnetwork.com"
  dockhand: "https://dockhand.ucontrolnetwork.com"

# Awareness Rules - What Oscar should check before suggesting actions
awareness:
  # Before suggesting new deployments
  check_deployments_before_suggesting: true
  deployments_check: "Read DEPLOYMENTS.md to verify service doesn't already exist"

  # Before suggesting automation
  check_n8n_before_building: true
  n8n_check: "Check n8n for existing workflows that might solve the problem"

  # When building n8n workflows - ENFORCE checklist
  enforce_n8n_checklist: true
  n8n_checklist: "/mnt/foundry_resources/n8n/CHECKLIST-new-workflow.md"
  n8n_required_items:
    - "Create docs folder with systems.md + admin.md"
    - "Add to Grist registry"
    - "Update README.md"
    - "Export workflow JSON with version"

  # Before suggesting monitoring/observability
  check_existing_tools: true
  tools_check: "Reference tool_inventory to see what's already available"

  # Before suggesting maintenance tasks
  check_maintenance_system: true
  maintenance_check: "Use existing Grist maintenance tracking, not ad-hoc reminders"

  # When routing to Sherlock
  check_project_readiness: true
  readiness_check: "Warn if project lacks observability tools before investigation"

# Agent Routing - How Oscar hands off to other tracker agents
routing:
  sherlock:
    trigger: "Investigation needed, debugging required, root cause unknown"
    handoff: "/oscar:handoff sherlock"
    pre_check: "Verify project has observability tools (sherlock-gaps.yaml)"

  augie:
    trigger: "Audit needed, compliance check, sprint review"
    handoff: "/oscar:handoff augie"
    pre_check: "Ensure acceptance criteria defined"

# Infrastructure-Specific Context
infrastructure_context:
  hosts:
    dev: "banner (10.0.0.33)"
    prod: "hulk (10.0.0.32)"
    experimental: "parker (10.0.0.34)"
    monitoring: "coulson (10.0.0.28)"
    infrastructure: "helicarrier (10.0.0.27)"

  never_deploy_to:
    - "stark (workstation)"
    - "friday (automation)"

  deployment_method: "portainer"

  key_paths:
    stacks: "/mnt/foundry_infrastructure/apps/"
    standards: "/mnt/foundry_infrastructure/standards-infrastructure/"
    protocols: "/mnt/foundry_resources/protocols/"
    artifact_checklists: "/mnt/foundry_resources/protocols/spine/artifact-checklists/"

# Artifact Checklist System
artifact_checklists:
  router: "/mnt/foundry_resources/protocols/spine/artifact-checklists/ROUTER.md"
  checklists:
    deployment: "/mnt/foundry_resources/protocols/spine/artifact-checklists/deployment.md"
    n8n_workflow: "/mnt/foundry_resources/protocols/spine/artifact-checklists/n8n-workflow.md"
    domain_dns: "/mnt/foundry_resources/protocols/spine/artifact-checklists/domain-dns.md"
    script: "/mnt/foundry_resources/protocols/spine/artifact-checklists/script.md"
    protocol: "/mnt/foundry_resources/protocols/spine/artifact-checklists/protocol.md"
    bugfix: "/mnt/foundry_resources/protocols/spine/artifact-checklists/bugfix.md"
    one_off: "/mnt/foundry_resources/protocols/spine/artifact-checklists/one-off.md"
    infrastructure_issue: "/mnt/foundry_resources/protocols/spine/artifact-checklists/infrastructure-issue.md"

  # Always check these when creating artifacts
  always_update:
    - "Grist Change_Log for significant changes"
    - "DEPLOYMENTS.md for new services"
    - "Grist registries for tracked items"

  # Sherlock pattern logging
  sherlock_logging:
    table: "Troubleshooting_Log"
    note: "Log bugs and fixes for pattern learning"

# Grist Tables Reference
grist_tables:
  hosts: "Hosts"
  apps: "Apps"
  deployments: "Deployments"
  n8n_workflows: "N8n_Workflows"
  change_log: "Change_Log"
  hosts_changelog: "Hosts_ChangeLog"
  troubleshooting: "Troubleshooting_Log"
  api_tokens: "API_Tokens"
  deferred_items: "Deferred_Items"
  agent_requests: "Agent_Requests"
