# Oscar Project Configuration
# Run /oscar:setup to configure these values interactively

tracking:
  type: github  # github | linear | bmad-artifacts
  config:
    repo: ""            # Set via /oscar:setup
    project_board: ""   # Set via /oscar:setup

phases:
  mode: full  # full | quick

gates:
  strict: true

observer:
  enabled: true
  auto_recovery: true

marathon:
  enabled: true
  max_attempts_per_issue: 3
