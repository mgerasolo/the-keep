# Spine Protocol Compliance Rules
# Augie uses these to audit artifacts against Spine requirements

ruleset:
  id: spine-protocol
  name: Spine Protocol Compliance
  version: "1.0.0"
  description: |
    Documentation-first artifact compliance. Verifies that artifacts
    follow Spine Protocol: document FIRST, update AS YOU GO, audit AFTER.

rules:
  # Documentation Existence
  - id: SPINE-001
    name: objectives-exists
    description: Artifact must have objectives.md or equivalent documentation
    severity: CRITICAL
    scope: all-artifacts
    check: |
      For deployments: Check {artifact}/overview.md or objectives.md exists
      For n8n workflows: Check {artifact}/objectives.md or admin.md exists
      For scripts: Check script header documentation exists
      For one-offs: Check objectives.md exists in artifact folder

  - id: SPINE-002
    name: status-documented
    description: Artifact must have current status indicator
    severity: WARNING
    scope: all-artifacts
    check: |
      Look for ## Status section with checkboxes OR
      Look for **Status:** inline indicator

  - id: SPINE-003
    name: tasks-tracked
    description: Artifact must have task list with standard markers
    severity: WARNING
    scope: multi-step-work
    check: |
      Look for ## Tasks section with [ ], [x], [-], [~] markers
      Verify tasks match actual work done

  # Registry Updates
  - id: SPINE-010
    name: grist-deployment-registered
    description: Deployments must be registered in Grist Deployments table
    severity: CRITICAL
    scope: deployments
    check: |
      Query Grist Deployments table for artifact name
      Verify record exists with current status

  - id: SPINE-011
    name: deployments-md-updated
    description: DEPLOYMENTS.md must include new deployments
    severity: CRITICAL
    scope: deployments
    check: |
      Search DEPLOYMENTS.md for artifact name
      Verify port, URL, and host documented

  - id: SPINE-012
    name: grist-n8n-registered
    description: n8n workflows must be registered in Grist N8n_Workflows table
    severity: CRITICAL
    scope: n8n-workflows
    check: |
      Query Grist N8n_Workflows table for workflow name
      Verify status is "active" or "planning"

  - id: SPINE-013
    name: n8n-readme-updated
    description: n8n README.md must list the workflow
    severity: WARNING
    scope: n8n-workflows
    check: |
      Search /mnt/foundry_resources/n8n/README.md for workflow name
      Verify section exists with docs links

  # Changelog Logging
  - id: SPINE-020
    name: changelog-logged
    description: Significant changes must be logged to Grist Change_Log
    severity: WARNING
    scope: deployments,protocols,major-changes
    check: |
      Query Grist Change_Log for recent entries matching artifact
      Verify entry exists within reasonable timeframe

  # Documentation Quality
  - id: SPINE-030
    name: docs-match-reality
    description: Documentation must match actual implementation
    severity: CRITICAL
    scope: all-artifacts
    check: |
      For deployments: Verify port in docs matches actual port
      For n8n: Verify endpoint URL is correct
      For scripts: Verify documented behavior matches actual

  - id: SPINE-031
    name: consumer-docs-exist
    description: Consumer-facing artifacts must have systems.md
    severity: WARNING
    scope: apis,webhooks,services
    check: |
      Check for systems.md in artifact folder
      Verify it documents API usage, endpoints, examples

  - id: SPINE-032
    name: admin-docs-exist
    description: Services must have admin.md for maintainers
    severity: WARNING
    scope: deployments,n8n-workflows
    check: |
      Check for admin.md in artifact folder
      Verify it documents architecture, credentials, troubleshooting

  # Checklist Compliance
  - id: SPINE-040
    name: checklist-followed
    description: Artifact type must follow its Spine checklist
    severity: WARNING
    scope: all-artifacts
    check: |
      Identify artifact type from ROUTER.md
      Verify all non-optional checklist items completed

  - id: SPINE-041
    name: phase-gates-passed
    description: All Spine phases completed in order
    severity: INFO
    scope: all-artifacts
    check: |
      Verify Phase 0 (Planning) docs created before Phase 1 (Build)
      Check timestamps or git history if available

# Artifact Type Detection
artifact_types:
  deployment:
    indicators:
      - docker-compose.yml exists
      - stack.yml exists
      - Located in /mnt/foundry_infrastructure/apps/
    checklist: deployment.md

  n8n-workflow:
    indicators:
      - workflow-v*.json exists
      - Located in /mnt/foundry_resources/n8n/*/
    checklist: n8n-workflow.md

  script:
    indicators:
      - *.sh file
      - Located in scripts/
    checklist: script.md

  one-off:
    indicators:
      - Located in one-offs/active/
      - Folder name starts with YYYY-MM-
    checklist: one-off.md

  protocol:
    indicators:
      - PROTOCOL.md exists
      - Located in /mnt/foundry_resources/protocols/
    checklist: protocol.md

# Grist Integration
grist:
  url: "http://10.0.0.33:3390"
  doc_id: "uNZG8PhepVScStYXVQKfR3"
  tables:
    deployments: "Deployments"
    n8n_workflows: "N8n_Workflows"
    change_log: "Change_Log"
    troubleshooting: "Troubleshooting_Log"

# Remediation Templates
remediation:
  SPINE-001: |
    Create objectives.md in artifact folder with:
    - ## Objective section explaining purpose
    - ## Plan section with approach
    - ## Tasks section with checklist items

  SPINE-010: |
    Add deployment to Grist:
    curl -X POST "http://10.0.0.33:3390/api/docs/{doc}/tables/Deployments/records" \
      -H "Authorization: Bearer $GRIST_API_KEY" \
      -d '{"records":[{"fields":{"App":"name","HostName":ID,"Port":XXXX,"Status":"active"}}]}'

  SPINE-011: |
    Add entry to DEPLOYMENTS.md following the existing format:
    | App | Host | Port | Internal URL | External URL | Notes |

  SPINE-020: |
    Add entry to Grist Change_Log:
    curl -X POST "http://10.0.0.33:3390/api/docs/{doc}/tables/Change_Log/records" \
      -H "Authorization: Bearer $GRIST_API_KEY" \
      -d '{"records":[{"fields":{"Type":"deployment","Description":"...","AffectedSystems":"..."}}]}'
