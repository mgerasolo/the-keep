# Sidebar Issue Compliance Rules
# Augie validates GitHub issues created via /sidebar

ruleset:
  id: sidebar-issues
  name: Sidebar Issue Compliance
  description: Ensures issues created via /sidebar have complete context
  version: "1.0.0"
  scope: github-issues

rules:
  # Section Presence Rules
  - id: SB-001
    name: Task Section Required
    description: Issue must have a Task section with actionable description
    severity: CRITICAL
    check: |
      Issue body must contain "## Task" header
      Content must not be empty or boilerplate
    remediation: "Add ## Task section with clear, actionable description of what needs to be done"

  - id: SB-002
    name: How We Got Here Required
    description: Issue must have narrative context explaining the journey
    severity: CRITICAL
    check: |
      Issue body must contain "## How We Got Here" header
      Must contain at least 3 bullet points covering:
      - Parent conversation context
      - The journey so far
      - What triggered this sidebar
    remediation: |
      Add ## How We Got Here section with:
      - **Parent conversation was working on:** [main topic/goal]
      - **The journey so far:** [key steps and decisions]
      - **What triggered this sidebar:** [specific moment/realization]
      - **Relevant decisions already made:** [constraints from parent]

  - id: SB-003
    name: Spawned From Required
    description: Issue must reference spawning conversation
    severity: CRITICAL
    check: |
      Issue body must contain "## Spawned From" header
      Must include:
      - Conversation ID (or "untracked")
      - Topic of parent conversation
      - Parent issues if any
    remediation: |
      Add ## Spawned From section with:
      - **Conversation:** [conv-id or "untracked"]
      - **Topic:** [parent conversation's main topic]
      - **Parent issues:** #XX (if applicable)

  - id: SB-004
    name: Current State Required
    description: Issue must describe parent work status
    severity: WARNING
    check: |
      Issue body must contain "## Current State of Parent Work" header
      Must describe what's done, pending, and dependent
    remediation: "Add ## Current State of Parent Work section describing parent conversation status"

  - id: SB-005
    name: Acceptance Criteria Required
    description: Issue must have clear done conditions
    severity: CRITICAL
    check: |
      Issue body must contain "## Acceptance Criteria" header
      Must contain at least one checkbox item
    remediation: "Add ## Acceptance Criteria section with at least one specific done condition as checkbox"

  - id: SB-006
    name: Dependencies Required
    description: Issue must document relationship to other work
    severity: WARNING
    check: |
      Issue body must contain "## Dependencies" header
      Must include Informs/Blocks/Blocked by (even if empty)
    remediation: |
      Add ## Dependencies section with:
      - **Informs:** #XX (or "none")
      - **Blocks:** #XX (or "none")
      - **Blocked by:** #XX (or "none")

  - id: SB-007
    name: When Done Required
    description: Issue must have closing instructions
    severity: WARNING
    check: |
      Issue body must contain "## When Done" header
      Must include instructions for completing the feedback loop
    remediation: |
      Add ## When Done section with standard instructions:
      - Comment findings/results on this issue
      - Comment on parent issues listed in "Informs"
      - Close this issue when complete

  # Content Quality Rules
  - id: SB-010
    name: No Boilerplate Content
    description: Sections must contain real content, not placeholder text
    severity: CRITICAL
    check: |
      No sections should contain:
      - "<placeholder>" or "[placeholder]" markers
      - "TBD" or "TODO" as the only content
      - Empty sections (header with no content)
    remediation: "Replace boilerplate/placeholder text with actual content"

  - id: SB-011
    name: Journey Has Minimum Detail
    description: How We Got Here must have sufficient narrative
    severity: WARNING
    check: |
      The "How We Got Here" section must:
      - Be at least 100 characters
      - Include at least 2 bullet points
      - Reference specific decisions or realizations
    remediation: "Expand How We Got Here section with more specific context about the journey"

  - id: SB-012
    name: Labels Applied
    description: Issue must have appropriate labels
    severity: INFO
    check: |
      Issue must have:
      - At least one label
      - Preferably: type:*, priority:*, and status:* labels
    remediation: "Add appropriate labels: type:(enhancement|bug|config), priority:(high|medium|low), status:(ai-ready|soon)"

audit_output:
  format: |
    ## 🛡️ Sidebar Issue Audit: #{issue_number}

    **Ruleset:** sidebar-issues v1.0.0
    **Verdict:** {verdict}

    ### Section Presence
    | Section | Status | Notes |
    |---------|--------|-------|
    | Task | {SB-001} | {notes} |
    | How We Got Here | {SB-002} | {notes} |
    | Spawned From | {SB-003} | {notes} |
    | Current State | {SB-004} | {notes} |
    | Acceptance Criteria | {SB-005} | {notes} |
    | Dependencies | {SB-006} | {notes} |
    | When Done | {SB-007} | {notes} |

    ### Content Quality
    | Check | Status | Notes |
    |-------|--------|-------|
    | No boilerplate | {SB-010} | {notes} |
    | Journey detail | {SB-011} | {notes} |
    | Labels applied | {SB-012} | {notes} |

    **Summary:** {critical} CRITICAL, {warning} WARNING, {info} INFO

    {remediation_section_if_failures}
