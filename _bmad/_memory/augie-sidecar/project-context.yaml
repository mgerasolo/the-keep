# Augie Project Context
# Generated by /augie:setup
# This file defines project-specific compliance configuration

project:
  name: ""
  type: ""  # frontend | backend | fullstack | infrastructure
  frameworks: []
  detected_patterns: []

# Audit profile configuration
audit_profiles:
  code:
    enabled: true
    rulesets:
      - security
      - bmad-standards
      - project/code
      - lessons-learned
  docs:
    enabled: true
    rulesets:
      - project/docs
      - lessons-learned
  process:
    enabled: true
    rulesets:
      - project/process
      - lessons-learned
  full:
    enabled: true
    rulesets:
      - all

# Severity thresholds
severity:
  block_on: critical  # critical | warning | info
  warn_on: warning

# Gate integration
gates:
  strict_mode: true  # false = warnings don't block
  required_gates:
    - pre-commit
    - pr-review

# Feedback loop configuration
feedback_loops:
  oscar:
    enabled: true
    auto_add_lessons: true
  sherlock:
    enabled: true
    auto_add_patterns: true
  user:
    enabled: true
    require_confirmation: false

# Documentation requirements
documentation:
  require_api_docs: true
  require_changelog: true
  require_readme_updates: true
  require_component_docs: false
  require_migration_guides: true
